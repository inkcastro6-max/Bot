[phases.setup]
nixPkgs = ["nodejs_20", "chromium", "glib", "nss", "nspr", "atk", "at-spi2-atk", "libdrm", "mesa", "libxkbcommon", "pango", "cairo", "alsa-lib"]
aptPkgs = ["libglib2.0-0", "libnss3", "libnspr4", "libatk1.0-0", "libatk-bridge2.0-0", "libdrm2", "libgbm1", "libasound2"]

[phases.install]
cmds = ["npm install"]

[start]
cmd = "node server.js"

